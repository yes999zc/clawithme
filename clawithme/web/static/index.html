<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>clawithme — OSINT Identity Panorama</title>
<style>
  :root {
    --bg: #fafafa; --card: #fff; --text: #171717;
    --text-secondary: #4d4d4d; --text-tertiary: #808080;
    --border: #e5e5e5; --accent: #1e293b; --accent-subtle: #f1f5f9;
    --green: #2e7d32; --green-bg: #e8f5e9;
    --amber: #b8860b; --amber-bg: #fff8e1;
    --red: #c62828; --red-bg: #fce4ec;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    max-width: 800px; margin: 0 auto; padding: 32px 20px 80px;
  }
  .brand { font-family: "SF Mono","Fira Code",monospace; font-size:13px; color:var(--text-tertiary); margin-bottom:4px; }
  h1 { font-size:26px; font-weight:600; letter-spacing:-0.5px; margin-bottom:24px; }

  /* ── Search section ───────────────────── */
  .search-box { display:flex; gap:8px; }
  .search-box input {
    flex:1; padding:10px 14px; border:1px solid var(--border); border-radius:6px;
    font-size:15px; outline:none; background:var(--card);
  }
  .search-box input:focus { border-color:var(--accent); }
  .search-box button {
    padding:10px 20px; background:var(--accent); color:#fff; border:none;
    border-radius:6px; font-size:14px; font-weight:500; cursor:pointer; white-space:nowrap;
  }
  .search-box button:disabled { opacity:0.4; cursor:not-allowed; }
  .search-box button.danger { background:var(--red); }

  .search-type-badge { display:inline-block; font-size:11px; padding:2px 8px; border-radius:4px; margin-top:6px; font-weight:500; }
  .search-type-badge.username { background:var(--accent-subtle); color:var(--text-secondary); }
  .search-type-badge.email { background:#e3f2fd; color:#1565c0; }
  .search-type-badge.phone { background:#fce4ec; color:var(--red); }

  .options-summary {
    font-size:12px; color:var(--text-tertiary); cursor:pointer;
    padding:6px 0; user-select:none;
  }
  .options-summary:hover { color:var(--text-secondary); }
  .params-panel {
    margin:4px 0 10px; padding:12px; background:var(--card);
    border:1px solid var(--border); border-radius:6px; font-size:13px;
    display:flex; flex-wrap:wrap; gap:10px; align-items:center;
  }
  .params-panel label { display:flex; align-items:center; gap:5px; color:var(--text-secondary); cursor:pointer; }
  .params-panel select { font-size:12px; padding:2px 6px; border:1px solid var(--border); border-radius:3px; }
  .ethics-label {
    display:flex; align-items:center; gap:8px;
    font-size:12px; color:var(--text-tertiary); margin:6px 0 4px;
  }

  /* ── Progress ────────────────────────── */
  .phase-indicator { font-size:13px; color:var(--text-tertiary); padding:6px 0; display:none; }
  .progress-bar { height:3px; background:var(--border); border-radius:2px; overflow:hidden; display:none; }
  .progress-fill { height:100%; background:var(--accent); border-radius:2px; transition:width 0.3s; }
  .cancel-btn {
    font-size:12px; color:var(--red); background:none; border:1px solid var(--red);
    border-radius:4px; padding:3px 10px; cursor:pointer; display:none; margin-left:8px;
  }
  .cancel-btn:hover { background:var(--red-bg); }

  /* ── Stats ───────────────────────────── */
  .stats-bar { display:none; gap:16px; margin:14px 0; flex-wrap:wrap; }
  .stat { text-align:center; min-width:50px; }
  .stat-num { font-size:22px; font-weight:600; font-variant-numeric:tabular-nums; color:var(--accent); line-height:1.2; }
  .stat-label { font-size:10px; text-transform:uppercase; color:var(--text-tertiary); letter-spacing:0.4px; }

  /* ── Download bar ────────────────────── */
  .download-bar { display:none; gap:8px; margin:0 0 14px; flex-wrap:wrap; }
  .download-bar button {
    font-size:12px; padding:5px 12px; border:1px solid var(--border);
    border-radius:5px; background:var(--card); cursor:pointer; color:var(--text-secondary);
  }
  .download-bar button:hover { border-color:var(--accent); color:var(--text); }

  /* ── Section titles ──────────────────── */
  .section-title {
    font-size:12px; font-weight:600; color:var(--text-tertiary);
    text-transform:uppercase; letter-spacing:0.4px; margin:24px 0 10px; display:none;
  }

  /* ── Site hits table ─────────────────── */
  .cat-label {
    font-size:12px; font-weight:500; color:var(--text-tertiary);
    margin:14px 0 4px; text-transform:uppercase; letter-spacing:0.4px;
  }
  .hit-row {
    display:flex; align-items:center; gap:8px; padding:6px 8px;
    border-bottom:1px solid #f5f5f5; font-size:13px;
  }
  .hit-row:hover { background:#fafafa; }
  .hit-row .hit-name { flex:0 0 120px; font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .hit-row .hit-url { flex:1; font-size:11px; color:var(--text-tertiary); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .hit-row .hit-url a { color:var(--text-tertiary); text-decoration:none; }
  .hit-row .hit-url a:hover { color:var(--accent); text-decoration:underline; }
  .hit-row .hit-status { font-family:monospace; font-size:11px; text-align:center; min-width:30px; }
  .badge {
    display:inline-block; font-size:9px; font-weight:600; padding:1px 5px;
    border-radius:3px; text-transform:uppercase; letter-spacing:0.3px; white-space:nowrap;
  }
  .badge-confirmed { background:var(--green-bg); color:var(--green); }
  .badge-uncertain { background:var(--amber-bg); color:var(--amber); }
  .badge-low { background:var(--red-bg); color:var(--red); }
  .wp-warn { font-size:10px; color:var(--red); font-weight:500; margin-left:4px; }

  /* ── Profile cards ───────────────────── */
  .card-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:10px; }
  .card {
    background:var(--card); border:1px solid var(--border); border-radius:8px;
    padding:14px; display:flex; flex-direction:column; gap:6px;
  }
  .card-header { display:flex; align-items:center; gap:10px; }
  .card-avatar {
    width:40px; height:40px; border-radius:50%; background:var(--accent-subtle);
    flex-shrink:0; overflow:hidden;
  }
  .card-avatar img { width:100%; height:100%; object-fit:cover; }
  .card-name { font-size:14px; font-weight:500; }
  .card-site { font-size:10px; color:var(--text-tertiary); text-transform:uppercase; letter-spacing:0.3px; }
  .card-bio { font-size:12px; color:var(--text-secondary); line-height:1.4; }
  .card-meta { font-size:11px; color:var(--text-tertiary); display:flex; flex-wrap:wrap; gap:8px; }
  .card-extras { display:flex; flex-wrap:wrap; gap:4px; }
  .extra-tag { font-size:10px; padding:1px 6px; background:#f5f5f5; border-radius:3px; color:var(--text-secondary); }
  .completeness-ring {
    width:36px; height:36px; border-radius:50%; flex-shrink:0;
    background: conic-gradient(var(--accent) 0deg calc(var(--pct)*3.6deg), #f0f0f0 calc(var(--pct)*3.6deg) 360deg);
    position:relative; display:flex; align-items:center; justify-content:center;
  }
  .completeness-ring::after {
    content: attr(data-pct); position:absolute; inset:4px; border-radius:50%;
    background:#fff; display:flex; align-items:center; justify-content:center;
    font-size:9px; font-weight:600; font-family:monospace;
  }
  .profile-details summary { font-size:11px; color:var(--text-tertiary); cursor:pointer; padding:4px 0; }
  .profile-details table { width:100%; border-collapse:collapse; font-size:11px; margin-top:4px; }
  .profile-details td { padding:3px 6px; border-bottom:1px solid #f5f5f5; vertical-align:top; }
  .profile-details td:first-child { font-family:monospace; color:var(--text-tertiary); width:80px; white-space:nowrap; }

  /* ── Cluster cards ───────────────────── */
  .cluster {
    background:var(--card); border:1px solid var(--border); border-radius:8px;
    padding:16px; margin-bottom:10px;
  }
  .cluster-hd { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .cluster-hd strong { font-size:13px; }
  .cluster-conf-bar { height:5px; background:#f0f0f0; border-radius:3px; overflow:hidden; margin-bottom:6px; }
  .cluster-conf-fill { height:100%; border-radius:3px; }
  .cluster-sites { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:6px; }
  .site-pill { font-size:11px; padding:2px 8px; background:var(--accent-subtle); border-radius:4px; color:var(--text-secondary); }
  .cluster-signals { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:6px; }
  .signal-tag { font-size:10px; padding:1px 6px; background:#f5f5f5; border-radius:3px; color:var(--text-secondary); font-family:monospace; }
  .cluster-evidence { font-size:11px; color:var(--text-secondary); padding:4px 0; }
  .cluster-evidence .sig { font-family:monospace; font-size:10px; background:#f5f5f5; padding:1px 5px; border-radius:3px; }

  /* ── Standalone profiles ────────────── */
  .singleton-row {
    display:flex; align-items:center; gap:8px; padding:8px 12px;
    border-bottom:1px solid #f5f5f5; font-size:13px;
  }
  .singleton-row:last-child { border-bottom:none; }

  /* ── Leak records ────────────────────── */
  .leak-source-hdr { font-size:12px; font-weight:500; color:var(--text-secondary); margin:10px 0 4px; }
  .leak-row { font-size:12px; padding:4px 8px; border-bottom:1px solid #f5f5f5; display:flex; gap:10px; }
  .leak-row .leak-email { flex:1; }
  .leak-row .leak-domain { color:var(--text-tertiary); flex:1; }
  .leak-row .leak-date { font-family:monospace; font-size:10px; color:var(--text-tertiary); }

  .error {
    color:var(--red); font-size:13px; padding:12px; background:var(--red-bg);
    border-radius:6px; display:none; margin:12px 0;
  }

  @media (max-width:480px) {
    body { padding:16px 12px 60px; }
    h1 { font-size:20px; }
    .search-box { flex-direction:column; }
    .search-box button { width:100%; }
    .stats-bar { gap:10px; }
    .card-grid { grid-template-columns:1fr; }
    .hit-row .hit-name { flex-basis:90px; }
  }
</style>
</head>
<body>

<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
  <div class="brand" data-i18n="brand">clawithme</div>
  <div style="display:flex;align-items:center;gap:4px;font-size:12px">
    <span style="color:var(--text-tertiary);cursor:pointer;padding:2px 6px;border-radius:3px"
      id="langToggleZh" onclick="setLang('zh')"
      style="color:var(--text-tertiary);cursor:pointer;padding:2px 6px;border-radius:3px;font-weight:600">中文</span>
    <span style="color:var(--border)">|</span>
    <span style="color:var(--text-tertiary);cursor:pointer;padding:2px 6px;border-radius:3px"
      id="langToggleEn" onclick="setLang('en')">EN</span>
  </div>
</div>
<h1 data-i18n="title">OSINT Identity Panorama</h1>

<div class="search-box">
  <input type="text" id="usernameInput" data-i18n="searchPlaceholder" placeholder="Username, email, or phone..." autofocus oninput="detectSearchType()">
  <button id="searchBtn" onclick="doSearch()" data-i18n="searchBtn">Search</button>
  <button class="cancel-btn" id="cancelBtn" onclick="cancelSearch()" data-i18n="cancelBtn">Cancel</button>
</div>
<div class="search-type-badge" id="searchTypeBadge" style="display:none"></div>
<div class="options-summary" onclick="toggleOptions()" data-i18n="searchOpts">⚙ Search options</div>
<div class="params-panel" id="paramsPanel" style="display:none">
  <label><input type="checkbox" id="chkMigrated"> <span data-i18n="optFullScan">Full scan (3119 sites, slower)</span></label>
  <label><input type="checkbox" id="chkNoCache"> <span data-i18n="optNoCache">No cache</span></label>
  <label><input type="checkbox" id="chkSync"> <span data-i18n="optSync">Sync mode</span></label>
</div>
<label class="ethics-label">
  <input type="checkbox" id="ethics"> <span data-i18n="ethicsLabel">I own this account or have authorization to search it</span>
</label>

<div class="phase-indicator" id="phaseIndicator"></div>
<div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>

<div class="stats-bar" id="statsBar">
  <div class="stat"><div class="stat-num" id="statHits">0</div><div class="stat-label" data-i18n="statsSites">Sites</div></div>
  <div class="stat"><div class="stat-num" id="statProfiles">0</div><div class="stat-label" data-i18n="statsProfiles">Profiles</div></div>
  <div class="stat"><div class="stat-num" id="statClusters">0</div><div class="stat-label" data-i18n="statsClusters">Clusters</div></div>
  <div class="stat"><div class="stat-num" id="statLeaks">0</div><div class="stat-label" data-i18n="statsLeaks">Leaks</div></div>
  <div class="stat"><div class="stat-num" id="statSearxng">0</div><div class="stat-label" data-i18n="statsSearxng">SearXNG</div></div>
  <div class="stat"><div class="stat-num" id="statTime">0s</div><div class="stat-label" data-i18n="statsTime">Elapsed</div></div>
</div>

<div class="download-bar" id="downloadBar">
  <button onclick="downloadReport('html')" data-i18n="downloadHtml">📄 Download HTML Report</button>
  <button onclick="downloadReport('json')" data-i18n="downloadJson">📋 Download JSON Report</button>
  <button onclick="downloadReport('pdf')" data-i18n="downloadPdf">📕 Download PDF Report</button>
  <button onclick="downloadReport('md')" data-i18n="downloadMd">📝 Download Markdown Report</button>
</div>

<div class="section-title" id="hitsTitle" data-i18n="titleHits">Site Hits</div>
<div id="hitsContainer"></div>

<div class="section-title" id="profilesTitle" data-i18n="titleProfiles">Profiles</div>
<div class="card-grid" id="profilesContainer"></div>

<div class="section-title" id="clustersTitle" data-i18n="titleMatches">Cross-Platform Matches</div>
<div id="clustersContainer"></div>

<div class="section-title" id="singletonsTitle" style="display:none" data-i18n="titleSingletons">Standalone Profiles</div>
<div id="singletonsContainer"></div>

<div class="section-title" id="leaksTitle" data-i18n="titleLeaks">Leak Records</div>
<div id="leaksContainer"></div>

<div class="error" id="errorDisplay"></div>

<script>
// ── State ──────────────────────────────────────────────────────
let evtSource = null;
let searchActive = false;
let currentUsername = '';
let currentTraceId = '';
let _cancelFlag = false;

// Identity-cluster state (collected across SSE events, rendered in done handler)
let _allProfileSites = [];     // site_id of every profile received
let _clusterData = [];          // raw cluster SSE data

const CONFIDENCE_LABELS = {
  high: { label: 'Very likely same person', level: 'high', color: '#2e7d32' },
  medium: { label: 'Likely same person', level: 'medium', color: '#b8860b' },
  low: { label: 'Possibly same person', level: 'low', color: '#b0b0b0' },
};

// Friendly signal descriptions (technical → plain language)
function sigDesc(s) {
  const map = { email:'sigEmail', phone:'sigPhone', avatar_phash:'sigAvatar',
    username:'sigUsername', joined_date:'sigJoined', location:'sigLocation' };
  return L(map[s] || s);
}

const _STRINGS = {
  zh: {
    title: 'OSINT 身份全景', brand: 'clawithme',
    searchPlaceholder: '用户名、邮箱或手机号...',
    searchBtn: '搜索', searchOpts: '⚙ 搜索选项', cancelBtn: '取消',
    ethicsLabel: '我拥有此账号或已获得授权',
    optFullScan: '全量搜索 (3119 站，较慢)', optNoCache: '禁用缓存', optSync: '同步模式', optLang: '语言',
    statsSites: '站点', statsProfiles: '资料', statsClusters: '聚类', statsLeaks: '泄露',
    statsSearxng: 'SearXNG', statsTime: '耗时',
    titleHits: '发现站点', titleProfiles: '提取资料', titleMatches: '跨平台关联', titleSingletons: '独立账号', titleLeaks: '泄露记录',
    downloadHtml: '📄 下载 HTML 报告', downloadJson: '📋 下载 JSON 报告', downloadPdf: '📕 下载 PDF 报告', downloadMd: '📝 下载 Markdown 报告',
    badgeConfirmed: '确认', badgeUncertain: '待验证', badgeLow: '低置信',
    wrongPerson: '⚠ 可能不是同一人',
    confVeryLikely: '非常确定是同一人', confLikely: '很可能是同一人', confPossibly: '可能是同一人', confWeak: '证据不足',
    sigEmail: '📧 两个平台使用了相同的邮箱',
    sigPhone: '📱 两个平台使用了相同的手机号',
    sigAvatar: '🖼 头像图片视觉相似',
    sigUsername: '📛 用户名高度相似',
    sigJoined: '📅 账号注册时间接近',
    sigLocation: '📍 两个平台填写了相同的位置',
    noMatch: '未发现任何两个 profile 之间的关联证据，每个账号似乎是独立的。',
    standalone: '— 未发现与其他账号的关联',
    noExtraEvidence: '未检测到邮箱、手机、头像等其他匹配信号。',
    searchTypeEmail: '📧 邮箱泄露搜索（仅查询泄露库）',
    searchTypePhone: '📱 手机泄露搜索（仅查询泄露库）',
    searchTypeUsername: '🔍 用户名搜索（全量站点探测）',
    done: '✅ 搜索完成', llmActive: 'LLM 验证器已启用', sources: '数据源',
    cancelled: '⏹ 已取消',
    error: '错误',
    fullProfileData: '完整资料',
  },
  en: {
    title: 'OSINT Identity Panorama', brand: 'clawithme',
    searchPlaceholder: 'Username, email, or phone...',
    searchBtn: 'Search', searchOpts: '⚙ Search options', cancelBtn: 'Cancel',
    ethicsLabel: 'I own this account or have authorization to search it',
    optFullScan: 'Full scan (3119 sites, slower)', optNoCache: 'No cache', optSync: 'Sync mode', optLang: 'Language',
    statsSites: 'Sites', statsProfiles: 'Profiles', statsClusters: 'Clusters', statsLeaks: 'Leaks',
    statsSearxng: 'SearXNG', statsTime: 'Elapsed',
    titleHits: 'Site Hits', titleProfiles: 'Profiles', titleMatches: 'Cross-Platform Matches', titleSingletons: 'Standalone Profiles', titleLeaks: 'Leak Records',
    downloadHtml: '📄 Download HTML Report', downloadJson: '📋 Download JSON Report', downloadPdf: '📕 Download PDF Report', downloadMd: '📝 Download Markdown Report',
    badgeConfirmed: 'Confirmed', badgeUncertain: 'Uncertain', badgeLow: 'Low',
    wrongPerson: '⚠ Likely wrong person',
    confVeryLikely: 'Very likely same person', confLikely: 'Likely same person', confPossibly: 'Possibly same person', confWeak: 'Weak evidence',
    sigEmail: '📧 Same email address used on both platforms',
    sigPhone: '📱 Same phone number used on both platforms',
    sigAvatar: '🖼 Avatar images appear visually similar',
    sigUsername: '📛 Usernames are very similar',
    sigJoined: '📅 Accounts were created around the same time',
    sigLocation: '📍 Same location listed on both profiles',
    noMatch: 'No evidence linking any two profiles to the same person. Each profile appears to belong to a different account.',
    standalone: '— No cross-platform match found',
    noExtraEvidence: 'No additional matching signals (email, phone, avatar) were detected.',
    searchTypeEmail: '📧 Email leak search (no site probing)',
    searchTypePhone: '📱 Phone leak search (no site probing)',
    searchTypeUsername: '🔍 Username search (full site probing)',
    done: '✅ Done', llmActive: 'LLM verifier active', sources: 'Sources',
    cancelled: '⏹ Cancelled',
    error: 'Error',
    fullProfileData: 'Full profile data',
  },
};

let _currentLang = 'zh';

function setLang(lang) {
  _currentLang = lang;
  document.getElementById('langToggleZh').style.fontWeight = lang === 'zh' ? '600' : '400';
  document.getElementById('langToggleEn').style.fontWeight = lang === 'en' ? '600' : '400';
  applyI18n();
}

function L(key) {
  const dict = _STRINGS[_currentLang] || _STRINGS.en;
  return dict[key] || _STRINGS.en[key] || key;
}

function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (el.tagName === 'INPUT') {
      el.placeholder = L(key);
    } else {
      el.textContent = L(key);
    }
  });
}

function catLabel(cat) {
  const en = { social:'Social', devtools:'Dev Tools', forum:'Forum', media:'Media',
    blog:'Blog', gaming:'Gaming', music:'Music', ecommerce:'E-Commerce' };
  const zh = { social:'社交', devtools:'开发工具', forum:'论坛', media:'媒体',
    blog:'博客', gaming:'游戏', music:'音乐', ecommerce:'电商' };
  const map = _currentLang === 'zh' ? zh : en;
  return map[cat] || cat;
}

// ── Search type detection ─────────────────────────────────────
function detectSearchType() {
  const v = document.getElementById('usernameInput').value.trim();
  const badge = document.getElementById('searchTypeBadge');
  if (!v) { badge.style.display = 'none'; return; }
  let label, cls;
  if (v.includes('@')) {
    label = L('searchTypeEmail'); cls = 'email';
  } else if (/^\d{7,15}$/.test(v)) {
    label = L('searchTypePhone'); cls = 'phone';
  } else {
    label = L('searchTypeUsername'); cls = 'username';
  }
  badge.textContent = label; badge.className = 'search-type-badge ' + cls; badge.style.display = '';
}

// ── Options panel toggle ──────────────────────────────────────
function toggleOptions() {
  const p = document.getElementById('paramsPanel');
  p.style.display = p.style.display === 'none' ? 'flex' : 'none';
}

// ── Cancel ────────────────────────────────────────────────────
function cancelSearch() {
  _cancelFlag = true;
  if (evtSource) { evtSource.close(); evtSource = null; }
  document.getElementById('phaseIndicator').textContent = L('cancelled');
  document.getElementById('cancelBtn').style.display = 'none';
  document.getElementById('searchBtn').disabled = false;
  document.getElementById('searchBtn').className = '';
  document.getElementById('progressBar').style.display = 'none';
  searchActive = false;
}

// ── Download ──────────────────────────────────────────────────
function downloadReport(fmt) {
  if (!currentTraceId) return;
  const params = new URLSearchParams({format: fmt, username: currentUsername, lang: _currentLang});
  window.location.href = '/api/report/' + encodeURIComponent(currentTraceId) + '?' + params.toString();
}

// ── Main search ────────────────────────────────────────────────
async function doSearch() {
  const input = document.getElementById('usernameInput');
  const username = input.value.trim();
  if (!username) return;
  if (!document.getElementById('ethics').checked) {
    alert('Please acknowledge ethical use first.');
    return;
  }

  // Reset
  _cancelFlag = false;
  currentUsername = username;
  currentTraceId = '';
  searchActive = true;
  _allProfileSites = [];
  _clusterData = [];
  document.getElementById('errorDisplay').style.display = 'none';
  document.getElementById('errorDisplay').textContent = '';
  document.getElementById('hitsContainer').innerHTML = '';
  document.getElementById('profilesContainer').innerHTML = '';
  document.getElementById('clustersContainer').innerHTML = '';
  document.getElementById('leaksContainer').innerHTML = '';
  document.querySelectorAll('.section-title').forEach(el => el.style.display = 'none');
  document.getElementById('singletonsContainer').innerHTML = '';
  document.getElementById('leaksContainer').innerHTML = '';
  document.getElementById('statsBar').style.display = 'none';
  document.getElementById('downloadBar').style.display = 'none';
  document.getElementById('progressBar').style.display = 'block';
  setProgress(10);
  document.getElementById('phaseIndicator').style.display = 'block';
  document.getElementById('phaseIndicator').textContent = 'Starting...';
  document.getElementById('cancelBtn').style.display = 'inline-block';
  document.getElementById('searchBtn').disabled = true;

  // Reset stat counters
  document.getElementById('statHits').textContent = '0';
  document.getElementById('statProfiles').textContent = '0';
  document.getElementById('statClusters').textContent = '0';
  document.getElementById('statLeaks').textContent = '0';
  document.getElementById('statSearxng').textContent = '0';
  document.getElementById('statTime').textContent = '0s';

  if (evtSource) { evtSource.close(); evtSource = null; }

  // Gather params
  const migrated = document.getElementById('chkMigrated').checked ? 'true' : 'false';
  const noCache  = document.getElementById('chkNoCache').checked ? 'true' : 'false';
  const sync     = document.getElementById('chkSync').checked ? 'true' : 'false';

  const qp = new URLSearchParams({
    ethics: 'true', migrated, no_cache: noCache, sync, lang: _currentLang,
  });
  const url = `/api/search/${encodeURIComponent(username)}?${qp.toString()}`;

  const sse = new EventSource(url);
  evtSource = sse;

  sse.addEventListener('phase', e => {
    if (_cancelFlag) return;
    try {
      const d = JSON.parse(e.data);
      document.getElementById('phaseIndicator').textContent = d.message;
      if (d.total) setProgress(20 + Math.min(60, (d.total / 50) * 60));
      else setProgress(30);
    } catch(_) {}
  });

  sse.addEventListener('hit', e => {
    if (_cancelFlag) return;
    try {
      const d = JSON.parse(e.data);
      document.getElementById('hitsTitle').style.display = 'block';
      document.getElementById('statsBar').style.display = 'flex';

      const cat = d.category || 'other';
      const catLabelStr = catLabel(cat);
      let catContainer = document.getElementById('hit-cat-' + cat);
      if (!catContainer) {
        catContainer = document.createElement('div');
        catContainer.id = 'hit-cat-' + cat;
        catContainer.innerHTML = '<div class="cat-label">' + esc(catLabelStr) + '</div>';
        document.getElementById('hitsContainer').appendChild(catContainer);
      }

      // confidence badge
      let badgeHtml = '';
      if (d.confidence !== undefined) {
        if (d.confidence >= 0.75) badgeHtml = '<span class="badge badge-confirmed">' + esc(L('badgeConfirmed')) + '</span>';
        else if (d.confidence >= 0.3) badgeHtml = '<span class="badge badge-uncertain">' + esc(L('badgeUncertain')) + '</span>';
        else badgeHtml = '<span class="badge badge-low">' + esc(L('badgeLow')) + '</span>';
      }
      const wpHtml = d.wrong_person ? '<span class="wp-warn">' + esc(L('wrongPerson')) + '</span>' : '';
      const statusHtml = d.status ? '<span class="hit-status">' + d.status + '</span>' : '';

      const row = document.createElement('div');
      row.className = 'hit-row';
      row.innerHTML = '<span class="hit-name">' + esc(d.site_name) + '</span>' +
        '<span class="hit-url"><a href="' + escAttr(d.url) + '" target="_blank" rel="noopener">' + esc(d.url) + '</a></span>' +
        statusHtml + badgeHtml + wpHtml;
      catContainer.appendChild(row);

      document.getElementById('statHits').textContent = parseInt(document.getElementById('statHits').textContent) + 1;
    } catch(_) {}
  });

  sse.addEventListener('profile', e => {
    if (_cancelFlag) return;
    try {
      const d = JSON.parse(e.data);
      document.getElementById('profilesTitle').style.display = 'block';
      document.getElementById('statsBar').style.display = 'flex';

      const avatarHtml = d.avatar_url
        ? '<img src="' + escAttr(d.avatar_url) + '" onerror="this.style.display=\'none\'">'
        : '';

      // Completeness donut (count non-null fields among display_name, bio, location, avatar_url, follower_count)
      const completenessFields = [d.display_name, d.bio, d.location, d.avatar_url, d.follower_count];
      const filled = completenessFields.filter(f => f !== null && f !== undefined && f !== '').length;
      const pct = Math.round(filled / completenessFields.length * 100);
      const donutHtml = '<div class="completeness-ring" style="--pct:' + pct + '" data-pct="' + pct + '%"></div>';

      const metaParts = [];
      if (d.location) metaParts.push('📍 ' + esc(d.location));
      if (d.follower_count !== null && d.follower_count !== undefined) metaParts.push('👥 ' + d.follower_count);
      if (d.following_count !== null && d.following_count !== undefined) metaParts.push('↗ ' + d.following_count);
      if (d.joined_date) metaParts.push('📅 ' + d.joined_date);

      // Extra tags
      let extrasHtml = '';
      if (d.extra && typeof d.extra === 'object') {
        const tags = [];
        for (const [k, v] of Object.entries(d.extra)) {
          if (v === null || v === undefined || v === '') continue;
          if (typeof v === 'boolean') { if (v) tags.push('<span class="extra-tag">✓ ' + esc(k) + '</span>'); }
          else if (typeof v === 'object') tags.push('<span class="extra-tag">' + esc(k) + ': ' + esc(JSON.stringify(v)) + '</span>');
          else tags.push('<span class="extra-tag">' + esc(k) + ': ' + esc(String(v).slice(0, 50)) + '</span>');
        }
        if (tags.length) extrasHtml = '<div class="card-extras">' + tags.join('') + '</div>';
      }

      // Detail table
      const detailFields = [
        ['username', d.username], ['display_name', d.display_name], ['email', d.email],
        ['phone', d.phone], ['location', d.location], ['bio', d.bio],
        ['joined_date', d.joined_date], ['post_count', d.post_count],
        ['follower_count', d.follower_count], ['following_count', d.following_count],
        ['avatar_url', d.avatar_url],
      ];
      const detailRows = detailFields
        .filter(([, v]) => v !== null && v !== undefined && v !== '')
        .map(([k, v]) => '<tr><td>' + esc(k) + '</td><td>' + esc(String(v).slice(0, 300)) + '</td></tr>')
        .join('');
      const detailsHtml = detailRows
        ? '<details class="profile-details"><summary>Full profile data</summary><table>' + detailRows + '</table></details>'
        : '';

      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = '<div class="card-header">' +
        '<div class="card-avatar">' + avatarHtml + '</div>' +
        '<div style="flex:1"><div class="card-name">' + esc(d.display_name || d.site_id) + '</div>' +
        '<div class="card-site">' + esc(d.site_id) + '</div></div>' +
        donutHtml + '</div>' +
        (d.bio ? '<div class="card-bio">' + esc(d.bio.slice(0, 200)) + '</div>' : '') +
        extrasHtml +
        (metaParts.length ? '<div class="card-meta">' + metaParts.join(' · ') + '</div>' : '') +
        detailsHtml;
      document.getElementById('profilesContainer').appendChild(card);

      // Track this profile site_id for identity-cluster rendering
      _allProfileSites.push(d.site_id);

      document.getElementById('statProfiles').textContent = parseInt(document.getElementById('statProfiles').textContent) + 1;
    } catch(_) {}
  });

  sse.addEventListener('cluster', e => {
    if (_cancelFlag) return;
    try {
      const d = JSON.parse(e.data);
      document.getElementById('clustersTitle').style.display = 'block';
      document.getElementById('statsBar').style.display = 'flex';

      // Store cluster data for rendering in done handler
      _clusterData.push(d);

      document.getElementById('statClusters').textContent = parseInt(document.getElementById('statClusters').textContent) + 1;
    } catch(_) {}
  });

  sse.addEventListener('leakstatus', e => {
    if (_cancelFlag) return;
    try {
      const d = JSON.parse(e.data);
      document.getElementById('leaksTitle').style.display = 'block';
      document.getElementById('statsBar').style.display = 'flex';

      // Show summary per source
      const container = document.getElementById('leaksContainer');
      container.innerHTML = '';

      // Summary line
      const total = d.total || 0;
      const srcList = (d.sources_used || []).join(', ');
      const summary = document.createElement('div');
      summary.style.cssText = 'font-size:12px;color:var(--text-secondary);margin-bottom:8px';
      if (total > 0) {
        const perSrc = Object.entries(d.per_source || {})
          .map(([s, c]) => esc(s) + ': ' + c)
          .join(' · ');
        summary.textContent = '🔓 ' + total + ' record(s) — ' + perSrc + ' (sources: ' + srcList + ')';
      } else {
        summary.textContent = '🔓 0 records (sources: ' + srcList + ')';
      }
      container.appendChild(summary);
    } catch(_) {}
  });

  sse.addEventListener('leak', e => {
    if (_cancelFlag) return;
    try {
      const d = JSON.parse(e.data);

      const src = d.source || 'unknown';
      let srcContainer = document.getElementById('leak-src-' + src.replace(/[^a-zA-Z0-9]/g, '-'));
      if (!srcContainer) {
        srcContainer = document.createElement('div');
        srcContainer.id = 'leak-src-' + src.replace(/[^a-zA-Z0-9]/g, '-');
        srcContainer.innerHTML = '<div class="leak-source-hdr">🔓 ' + esc(src) + '</div>';
        document.getElementById('leaksContainer').appendChild(srcContainer);
      }

      const row = document.createElement('div');
      row.className = 'leak-row';
      row.innerHTML = '<span class="leak-email">' + (d.email ? esc(redactEmail(d.email)) : '-') + '</span>' +
        '<span class="leak-domain">' + (d.domain ? esc(d.domain) : '') + '</span>' +
        '<span class="leak-date">' + (d.breach_date || '') + '</span>';
      srcContainer.appendChild(row);

      document.getElementById('statLeaks').textContent = parseInt(document.getElementById('statLeaks').textContent) + 1;
    } catch(_) {}
  });

  sse.addEventListener('done', e => {
    if (_cancelFlag) return;
    try {
      const d = JSON.parse(e.data);
      currentTraceId = d.trace_id;
      document.getElementById('statTime').textContent = d.elapsed_s + 's';
      document.getElementById('statSearxng').textContent = d.searxng_hits || 0;
      document.getElementById('phaseIndicator').textContent = L('done') + ' in ' + d.elapsed_s + 's' +
        (d.llm_configured ? ' · ' + L('llmActive') : '') +
        (d.sources_used ? ' · ' + L('sources') + ': ' + d.sources_used.join(', ') : '');
      document.getElementById('progressBar').style.display = 'none';
      document.getElementById('cancelBtn').style.display = 'none';
      document.getElementById('searchBtn').disabled = false;

      // Show download buttons if we have a trace_id and hits
      if (d.trace_id && d.hits > 0) {
        document.getElementById('downloadBar').style.display = 'flex';
      }

      // Render identity groups (clusters + singletons)
      renderClustersAndSingletons();

      sse.close(); evtSource = null; searchActive = false;
    } catch(_) {}
  });

  sse.addEventListener('error', e => {
    if (_cancelFlag) return;
    let msg = null;
    if (e.data) { try { msg = JSON.parse(e.data); } catch(_) {} }
    const errText = msg || (sse.readyState === EventSource.CLOSED ? 'Connection lost' : 'Connection error');
    showError(errText);
    if (sse.readyState === EventSource.CLOSED) {
      sse.close(); evtSource = null; searchActive = false;
      document.getElementById('cancelBtn').style.display = 'none';
      document.getElementById('searchBtn').disabled = false;
      document.getElementById('progressBar').style.display = 'none';
    }
  });
}

function setProgress(pct) {
  const bar = document.getElementById('progressFill');
  bar.style.width = Math.min(pct, 95) + '%';
}

function showError(msg) {
  const el = document.getElementById('errorDisplay');
  el.textContent = 'Error: ' + (typeof msg === 'string' ? msg : JSON.stringify(msg));
  el.style.display = 'block';
  document.getElementById('progressBar').style.display = 'none';
  document.getElementById('cancelBtn').style.display = 'none';
  document.getElementById('searchBtn').disabled = false;
}

// ── Helpers ──────────────────────────────────────────────────
function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

function escAttr(s) {
  if (!s) return '';
  return esc(s).replace(/"/g, '&quot;');
}

function redactEmail(email) {
  const parts = email.split('@');
  if (parts.length !== 2) return email;
  const local = parts[0];
  const domain = parts[1];
  if (local.length <= 2) return local[0] + '***@' + domain;
  return local[0] + '***' + local[local.length - 1] + '@' + domain;
}

function _confLabel(confidence) {
  if (confidence >= 0.9) return { text: L('confVeryLikely'), color: '#2e7d32', cls: 'high' };
  if (confidence >= 0.7) return { text: L('confLikely'), color: '#b8860b', cls: 'medium' };
  if (confidence >= 0.5) return { text: L('confPossibly'), color: '#b0b0b0', cls: 'low' };
  return { text: L('confWeak'), color: '#b0b0b0', cls: 'low' };
}

function renderClustersAndSingletons() {
  const container = document.getElementById('clustersContainer');
  container.innerHTML = '';

  // Build set of all profile site_ids that appear in any cluster
  const clusteredSites = new Set();
  _clusterData.forEach(c => {
    (c.sites || []).forEach(s => clusteredSites.add(s));
  });

  // Determine singletons (profiles not in any cluster)
  const singletonSites = _allProfileSites.filter(s => !clusteredSites.has(s));

  // ── Render clusters ──
  if (_clusterData.length === 0 && singletonSites.length > 0) {
    // Profiles exist but no cross-platform matches found
    const note = document.createElement('div');
    note.className = 'cluster';
    note.innerHTML = '<div style="font-size:13px;color:var(--text-secondary);padding:4px 0">' + esc(L('noMatch')) + '</div>';
    container.appendChild(note);
  }

  _clusterData.forEach((d, idx) => {
    const pct = Math.round(d.confidence * 100);
    const cl = _confLabel(d.confidence);
    const siteCount = (d.sites || []).length;

    // Site pills
    const sitesHtml = (d.sites || []).map(s => '<span class="site-pill">' + esc(s) + '</span>').join('');

    // ── Condense evidence into readable summaries ──
    const evidenceLines = [];

    if (d.evidence) {
      for (const [sig, details] of Object.entries(d.evidence)) {
        if (!Array.isArray(details) || details.length === 0) continue;

        const sigLabel = sigDesc(sig);

        // Parse evidence into pair_key + value
        // New format: "siteA ↔ siteB: value"
        // Old format: "value"
        const parsed = details.map(det => {
          const colon = det.indexOf(': ');
          if (colon > 0 && det.includes('↔')) {
            return {
              pair: det.substring(0, colon).trim(),
              value: det.substring(colon + 2).trim(),
              original: det,
            };
          }
          return { pair: '', value: det, original: det };
        });

        if (sig === 'username') {
          // Dedup by the actual username-pair similarity (not site pair)
          const seenPair = new Set();
          const unique = parsed.filter(p => {
            const simMatch = p.value.match(/sim=([\d.]+)/);
            const nameMatch = p.value.match(/(.+?) ↔ (.+?) \(sim=/);
            if (nameMatch) {
              const key = nameMatch[1].toLowerCase() + '|' + nameMatch[2].toLowerCase() + '|' + (simMatch ? simMatch[1] : '');
              if (seenPair.has(key)) return false;
              seenPair.add(key);
              return true;
            }
            return !seenPair.has(p.value);
          });

          if (unique.length === 1 && siteCount > 2) {
            // All profiles share the same username — summarize
            const nameMatch = unique[0].value.match(/^(.+?) ↔/);
            const nameVal = nameMatch ? nameMatch[1].trim() : '';
            evidenceLines.push(sigLabel + ' — All ' + siteCount + ' profiles share the same username "' + esc(nameVal) + '"');
          } else {
            unique.forEach(p => {
              const line = p.pair ? p.pair + ': ' + p.value : p.value;
              evidenceLines.push(sigLabel + ' — ' + esc(line));
            });
          }
        } else {
          // For email, phone, avatar, etc.: dedup by shared VALUE (what was matched)
          const seenValue = new Set();
          const unique = parsed.filter(p => {
            const norm = p.value.replace(/\s+/g, ' ').trim().toLowerCase();
            if (seenValue.has(norm)) return false;
            seenValue.add(norm);
            return true;
          });

          if (unique.length === 1 && siteCount > 2 && (sig === 'email' || sig === 'phone')) {
            evidenceLines.push(sigLabel + ' — Shared across all ' + siteCount + ' profiles');
          } else {
            unique.forEach(p => {
              const line = p.pair ? p.pair + ': ' + p.value : p.value;
              evidenceLines.push(sigLabel + ' — ' + esc(line));
            });
          }
        }
      }
    }

    // If no specific cross-signal evidence beyond shared username, add a summary
    if (evidenceLines.length === 0 && siteCount > 1) {
      evidenceLines.push('All ' + siteCount + ' profiles were found for the same search username. ' + L('noExtraEvidence'));
    }

    const evidenceHtml = evidenceLines.map(line =>
      '<div class="cluster-evidence" style="margin-top:4px">' + line + '</div>'
    ).join('');

    const div = document.createElement('div');
    div.className = 'cluster';
    div.innerHTML =
      // Header: confidence as readable label
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">' +
      '<span style="font-size:13px;font-weight:600;color:' + cl.color + '">' + esc(cl.text) + '</span>' +
      '<span style="font-size:11px;color:var(--text-tertiary)">(' + pct + '% confidence, ' + siteCount + ' sites)</span></div>' +
      // Confidence bar
      '<div class="cluster-conf-bar"><div class="cluster-conf-fill" style="width:' + pct + '%;background:' + cl.color + '"></div></div>' +
      // Sites
      '<div class="cluster-sites">' + sitesHtml + '</div>' +
      // Evidence
      evidenceHtml;
    container.appendChild(div);
  });

  // ── Render singletons ──
  if (singletonSites.length > 0) {
    document.getElementById('singletonsTitle').style.display = 'block';
    const singletonContainer = document.getElementById('singletonsContainer');
    singletonContainer.innerHTML = '';
    singletonSites.forEach(s => {
      const div = document.createElement('div');
      div.className = 'singleton-row';
      div.innerHTML = '<span style="font-size:14px">👤</span>' +
        '<span style="font-weight:500">' + esc(s) + '</span>' +
        '<span style="font-size:12px;color:var(--text-tertiary)">' + esc(L('standalone')) + '</span>';
      singletonContainer.appendChild(div);
    });
  }

  // Show the clusters title if there's anything to show
  if (_clusterData.length > 0 || singletonSites.length > 0) {
    document.getElementById('clustersTitle').style.display = 'block';
  }
}

// Apply i18n on load and when lang changes
applyI18n();

// Enter key support
document.getElementById('usernameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});
</script>
