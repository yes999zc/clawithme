<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>clawithme — OSINT Identity Panorama</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ── Vercel Design Tokens ─────────────────────────────────── */
  :root {
    --bg: #ffffff;
    --surface: #ffffff;
    --text: #171717;
    --text-secondary: #4d4d4d;
    --text-tertiary: #808080;
    --border: #ebebeb;
    --accent: #171717;
    --shadow-border: 0px 0px 0px 1px rgba(0, 0, 0, 0.08);
    --shadow-card: 0px 0px 0px 1px rgba(0, 0, 0, 0.08), 0px 2px 2px rgba(0,0,0,0.04), #fafafa 0px 0px 0px 1px;
    --radius: 6px;
    --radius-card: 8px;
    --focus-ring: 2px solid hsla(212, 100%, 48%, 1);
    /* Confidence */
    --green: #166534; --green-bg: #f0fdf4;
    --amber: #92400e; --amber-bg: #fefce8;
    --red: #991b1b; --red-bg: #fef2f2;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Geist', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ──────────────────────────────────────────────── */
  .header {
    position: fixed; top:0; left:0; right:0; z-index: 10;
    display: flex; justify-content: space-between; align-items: center;
    padding: 20px 40px;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }
  .header-brand {
    font-family: 'Geist', system-ui, sans-serif;
    font-size: 16px; font-weight: 600; letter-spacing: -0.32px;
    color: var(--text);
  }
  .header-lang {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 500; color: var(--text-tertiary);
  }
  .header-lang span { cursor: pointer; padding: 2px 6px; border-radius: 4px; }
  .header-lang span.active { color: var(--text); }
  .header-lang .sep { color: var(--border); cursor: default; }

  /* ── Hero section ────────────────────────────────────────── */
  .hero {
    position: relative; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 120px 20px 60px;
    background: var(--bg);
    overflow: hidden;
  }
  /* Subtle dot grid — Vercel/Linear style */
  .hero::before {
    content: ''; position: absolute; inset: 0; z-index: 0;
    background-image: radial-gradient(circle, rgba(0,0,0,0.06) 1px, transparent 1px);
    background-size: 20px 20px;
  }
  .hero-content { position: relative; z-index: 1; width: 100%; max-width: 560px; text-align: center; }

  .hero-brand {
    font-family: 'Geist', system-ui, sans-serif;
    font-size: 48px; font-weight: 600; letter-spacing: -2.4px; line-height: 1.0;
    color: var(--text); margin-bottom: 8px;
  }
  .hero-subtitle {
    font-family: 'Geist', system-ui, sans-serif;
    font-size: 20px; font-weight: 400; letter-spacing: normal; line-height: 1.8;
    color: var(--text-secondary); margin-bottom: 40px;
  }

  /* ── Search bar ──────────────────────────────────────────── */
  .search-row { display: flex; gap: 8px; margin-bottom: 16px; }
  .search-input {
    flex: 1; padding: 12px 16px;
    font-family: 'Geist', system-ui, sans-serif; font-size: 16px; font-weight: 400;
    color: var(--text); background: var(--surface);
    border: none; border-radius: var(--radius);
    box-shadow: var(--shadow-border);
    outline: none; transition: box-shadow 0.15s;
  }
  .search-input::placeholder { color: var(--text-tertiary); }
  .search-input:focus { box-shadow: 0px 0px 0px 1px rgba(0,0,0,0.15), var(--focus-ring); }

  .btn-primary {
    padding: 12px 24px;
    font-family: 'Geist', system-ui, sans-serif;
    font-size: 14px; font-weight: 500;
    color: #ffffff; background: var(--accent);
    border: none; border-radius: var(--radius);
    cursor: pointer; white-space: nowrap;
    transition: background 0.15s;
  }
  .btn-primary:hover { background: #2a2a2a; }
  .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-primary:focus-visible { outline: var(--focus-ring); outline-offset: 2px; }

  .btn-ghost {
    padding: 12px 24px;
    font-family: 'Geist', system-ui, sans-serif;
    font-size: 14px; font-weight: 500;
    color: var(--text); background: var(--surface);
    border: none; border-radius: var(--radius);
    box-shadow: var(--shadow-border);
    cursor: pointer; white-space: nowrap;
    transition: box-shadow 0.15s;
  }
  .btn-ghost:hover { box-shadow: 0px 0px 0px 1px rgba(0,0,0,0.15); }
  .btn-ghost:disabled { opacity: 0.35; cursor: not-allowed; }

  .search-type-tag {
    display: inline-block; font-size: 11px; font-weight: 500;
    padding: 4px 12px; border-radius: 9999px;
    margin-bottom: 14px; color: var(--text-secondary);
    background: #f5f5f5;
  }

  .options-trigger {
    font-size: 13px; font-weight: 400; color: var(--text-tertiary);
    cursor: pointer; padding: 6px 0; user-select: none; margin-bottom: 14px;
  }
  .options-trigger:hover { color: var(--text-secondary); }

  .params-panel {
    display: none; flex-wrap: wrap; gap: 14px;
    padding: 14px 16px; margin-bottom: 14px; text-align: left;
    border: 1px solid var(--border); border-radius: var(--radius-card);
    background: #fafafa;
    font-size: 13px; color: var(--text-secondary);
  }
  .params-panel label { display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 13px; }
  .params-panel input[type="checkbox"] { accent-color: var(--accent); }
  .params-panel select {
    font-size: 13px; padding: 2px 6px;
    border: 1px solid var(--border); border-radius: 4px;
    background: var(--surface); color: var(--text);
  }

  .ethics-row {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--text-tertiary); cursor: pointer;
  }
  .ethics-row input[type="checkbox"] { accent-color: var(--accent); }

  .scroll-hint {
    position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%);
    font-size: 12px; font-weight: 400; color: var(--text-tertiary);
    display: none;
  }

  /* ── Divider ─────────────────────────────────────────────── */
  .section-divider { border: none; border-top: 1px solid var(--border); display: none; }

  /* ── Results area ────────────────────────────────────────── */
  .results {
    max-width: 860px; margin: 0 auto; padding: 0 20px 120px;
    display: none;
  }

  /* Phase indicator */
  .phase-line { display: flex; align-items: center; gap: 10px; padding: 12px 0; display: none; }
  .phase-text {
    font-size: 13px; font-weight: 500; color: var(--text-secondary);
  }

  /* Progress bar */
  .progress-wrap { height: 2px; background: var(--border); display: none; margin-bottom: 20px; border-radius: 1px; overflow: hidden; }
  .progress-fill { height: 2px; background: var(--accent); transition: width 0.3s; }

  /* Stats bar */
  .stats-row { display: flex; gap: 28px; padding: 16px 0 20px; flex-wrap: wrap; display: none; }
  .stat-item { text-align: center; min-width: 60px; }
  .stat-num {
    font-family: 'Geist', system-ui, sans-serif;
    font-size: 32px; font-weight: 600; letter-spacing: -1.28px;
    font-variant-numeric: tabular-nums; color: var(--text); line-height: 1.1;
  }
  .stat-label {
    font-size: 11px; font-weight: 500; color: var(--text-tertiary); margin-top: 4px;
  }

  /* Download bar */
  .download-row { display: flex; gap: 8px; flex-wrap: wrap; padding: 16px 0; display: none; }
  .dl-btn {
    padding: 8px 16px; font-size: 13px; font-weight: 500; cursor: pointer;
    border: none; border-radius: var(--radius);
    box-shadow: var(--shadow-border); background: var(--surface);
    color: var(--text-secondary); transition: box-shadow 0.15s, color 0.15s;
    font-family: 'Geist', system-ui, sans-serif;
  }
  .dl-btn:hover { box-shadow: 0px 0px 0px 1px rgba(0,0,0,0.15); color: var(--text); }

  /* Section titles */
  .sec-title {
    font-family: 'Geist', system-ui, sans-serif;
    font-size: 16px; font-weight: 600; letter-spacing: -0.32px;
    color: var(--text); padding: 36px 0 12px; display: none;
  }

  /* ── Site hits table ─────────────────────────────────────── */
  .cat-header {
    font-size: 12px; font-weight: 500; color: var(--text-tertiary);
    padding: 14px 0 6px;
  }
  .hit-row {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 0; font-size: 14px;
    border-bottom: 1px solid #f5f5f5;
  }
  .hit-row:hover { background: #fafafa; }
  .hit-name { flex: 0 0 140px; font-weight: 500; }
  .hit-url { flex: 1; font-size: 13px; color: var(--text-tertiary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .hit-url a { color: var(--text-tertiary); text-decoration: none; }
  .hit-url a:hover { color: var(--text); }
  .tag {
    display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 4px;
  }
  .tag-ok { background: var(--green-bg); color: var(--green); }
  .tag-maybe { background: var(--amber-bg); color: var(--amber); }
  .tag-low { background: var(--red-bg); color: var(--red); }

  /* ── Profile cards ───────────────────────────────────────── */
  .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 12px; }
  .card {
    background: var(--surface); border-radius: var(--radius-card);
    box-shadow: var(--shadow-card);
    padding: 18px; display: flex; flex-direction: column; gap: 8px;
    transition: box-shadow 0.15s;
  }
  .card:hover {
    box-shadow: 0px 0px 0px 1px rgba(0,0,0,0.1), 0px 4px 6px rgba(0,0,0,0.04);
  }
  .card-hd { display: flex; align-items: center; gap: 12px; }
  .card-av {
    width: 40px; height: 40px; border-radius: 50%;
    background: #f5f5f5; flex-shrink: 0; overflow: hidden;
  }
  .card-av img { width: 100%; height: 100%; object-fit: cover; }
  .card-name { font-size: 16px; font-weight: 500; letter-spacing: -0.32px; color: var(--text); }
  .card-site { font-size: 12px; font-weight: 400; color: var(--text-tertiary); }
  .card-bio { font-size: 14px; color: var(--text-secondary); line-height: 1.5; }
  .card-meta { font-size: 13px; color: var(--text-tertiary); display: flex; flex-wrap: wrap; gap: 10px; }
  .card-extras { display: flex; flex-wrap: wrap; gap: 4px; }
  .extra-tag { font-size: 12px; padding: 2px 8px; background: #f5f5f5; border-radius: 4px; color: var(--text-secondary); }

  .comp-ring {
    width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
    background: conic-gradient(#d4d4d4 0deg calc(var(--pct)*3.6deg), #f5f5f5 calc(var(--pct)*3.6deg) 360deg);
    position: relative; display: flex; align-items: center; justify-content: center;
  }
  .comp-ring::after {
    content: attr(data-pct); position: absolute; inset: 4px; border-radius: 50%;
    background: var(--surface); display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 600; color: var(--text-secondary);
  }

  .profile-details summary { font-size: 13px; font-weight: 500; color: var(--text-tertiary); cursor: pointer; padding: 4px 0; }
  .profile-details table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 4px; }
  .profile-details td { padding: 4px 8px; border-bottom: 1px solid #f5f5f5; vertical-align: top; }
  .profile-details td:first-child { color: var(--text-tertiary); width: 90px; white-space: nowrap; }

  /* ── Clusters ────────────────────────────────────────────── */
  .cluster {
    background: var(--surface); border-radius: var(--radius-card);
    box-shadow: var(--shadow-card);
    padding: 20px; margin-bottom: 12px;
  }
  .cluster-bar { height: 3px; background: #f0f0f0; border-radius: 2px; overflow: hidden; margin: 10px 0; }
  .cluster-bar-fill { height: 100%; border-radius: 2px; }
  .cluster-sites { display: flex; flex-wrap: wrap; gap: 4px; margin: 8px 0; }
  .site-pill {
    font-size: 12px; padding: 3px 10px; background: #f5f5f5; border-radius: 4px;
    color: var(--text-secondary); font-weight: 500;
  }
  .cluster-ev { font-size: 13px; color: var(--text-secondary); padding: 4px 0; line-height: 1.6; }

  /* ── Singleton rows ──────────────────────────────────────── */
  .singleton-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; font-size: 14px;
    border-bottom: 1px solid #f5f5f5;
  }
  .singleton-row:last-child { border-bottom: none; }

  /* ── Leak records ────────────────────────────────────────── */
  .leak-src-hdr { font-size: 12px; font-weight: 500; color: var(--text-secondary); padding: 12px 0 6px; }
  .leak-row { font-size: 13px; padding: 4px 0; display: flex; gap: 12px; color: var(--text-secondary); border-bottom: 1px solid #f5f5f5; }
  .leak-email { flex: 1; }
  .leak-domain { flex: 1; color: var(--text-tertiary); }
  .leak-date { font-family: 'Geist Mono', monospace; font-size: 11px; color: var(--text-tertiary); }

  /* Error */
  .error-msg {
    color: var(--red); font-size: 14px; padding: 14px;
    border: 1px solid #fecaca; border-radius: var(--radius-card);
    background: var(--red-bg); display: none; margin: 12px 0;
  }

  /* ── Responsive ──────────────────────────────────────────── */
  @media (max-width: 640px) {
    .header { padding: 16px 20px; }
    .hero-brand { font-size: 36px; letter-spacing: -1.8px; }
    .hero-subtitle { font-size: 16px; margin-bottom: 32px; }
    .search-row { flex-direction: column; }
    .btn-primary, .btn-ghost { width: 100%; }
    .stats-row { gap: 16px; }
    .stat-num { font-size: 24px; }
    .card-grid { grid-template-columns: 1fr; }
    .hit-name { flex-basis: 100px; }
    .download-row { flex-direction: column; }
    .dl-btn { text-align: center; }
  }
</style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────── -->
<header class="header">
  <div class="header-brand">clawithme</div>
  <div class="header-lang">
    <a href="/admin" title="Admin" style="text-decoration:none;color:inherit;margin-right:12px;font-size:16px">⚙️</a>
    <span id="langToggleZh" class="active" onclick="setLang('zh')">中文</span>
    <span class="sep">|</span>
    <span id="langToggleEn" onclick="setLang('en')">EN</span>
  </div>
</header>

<!-- ── Hero ────────────────────────────────────────────────── -->
<section class="hero" id="heroSection">
  <div class="hero-content">
    <div class="hero-brand">clawithme</div>
    <div class="hero-subtitle" data-i18n="heroSub">Open-source OSINT identity search</div>

    <div class="search-row">
      <input type="text" id="usernameInput" class="search-input"
        data-i18n="searchPlaceholder" placeholder="Username, email, or phone..."
        autofocus oninput="detectSearchType()">
      <button id="searchBtn" class="btn-primary" onclick="doSearch()" data-i18n="searchBtn">Search</button>
      <button id="cancelBtn" class="btn-ghost" onclick="cancelSearch()" data-i18n="cancelBtn" style="display:none">Cancel</button>
    </div>

    <div class="search-type-tag" id="searchTypeBadge" style="display:none"></div>
    <div class="options-trigger" onclick="toggleOptions()" data-i18n="searchOpts">Search Options</div>
    <div class="params-panel" id="paramsPanel">
      <label><input type="checkbox" id="chkMigrated"> <span data-i18n="optFullScan">Full scan (3119 sites, slower)</span></label>
      <label><input type="checkbox" id="chkNoCache"> <span data-i18n="optNoCache">No cache</span></label>
      <label><input type="checkbox" id="chkSync"> <span data-i18n="optSync">Sync mode</span></label>
      <label><input type="checkbox" id="chkIncremental"> <span data-i18n="optIncremental">Incremental (skip cached)</span></label>
    </div>

    <label class="ethics-row">
      <input type="checkbox" id="ethics">
      <span data-i18n="ethicsLabel">I own this account or have authorization to search it</span>
    </label>
  </div>

  <div class="scroll-hint" id="scrollHint">↓ Scroll for results</div>
</section>

<hr class="section-divider" id="resultDivider">

<!-- ── Results ─────────────────────────────────────────────── -->
<section class="results" id="resultsSection">

  <div class="phase-line" id="phaseLine">
    <span class="phase-text" id="phaseIndicator"></span>
  </div>
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <div class="stats-row" id="statsRow">
    <div class="stat-item"><div class="stat-num" id="statHits">0</div><div class="stat-label" data-i18n="statsSites">Sites</div></div>
    <div class="stat-item"><div class="stat-num" id="statProfiles">0</div><div class="stat-label" data-i18n="statsProfiles">Profiles</div></div>
    <div class="stat-item"><div class="stat-num" id="statClusters">0</div><div class="stat-label" data-i18n="statsClusters">Clusters</div></div>
    <div class="stat-item"><div class="stat-num" id="statLeaks">0</div><div class="stat-label" data-i18n="statsLeaks">Leaks</div></div>
    <div class="stat-item"><div class="stat-num" id="statSearxng">0</div><div class="stat-label" data-i18n="statsSearxng">SearXNG</div></div>
    <div class="stat-item"><div class="stat-num" id="statTime">0s</div><div class="stat-label" data-i18n="statsTime">Elapsed</div></div>
  </div>

  <div class="download-row" id="downloadRow">
    <button class="dl-btn" onclick="downloadReport('html')" data-i18n="downloadHtml">HTML Report</button>
    <button class="dl-btn" onclick="downloadReport('json')" data-i18n="downloadJson">JSON Report</button>
    <button class="dl-btn" onclick="downloadReport('pdf')" data-i18n="downloadPdf">PDF Report</button>
    <button class="dl-btn" onclick="downloadReport('md')" data-i18n="downloadMd">Markdown Report</button>
  </div>

  <div class="sec-title" id="hitsTitle" data-i18n="titleHits">Site Hits</div>
  <div id="hitsContainer"></div>

  <div class="sec-title" id="profilesTitle" data-i18n="titleProfiles">Profiles</div>
  <div class="card-grid" id="profilesContainer"></div>

  <div class="sec-title" id="clustersTitle" data-i18n="titleMatches">Cross-Platform Matches</div>
  <div id="clustersContainer"></div>

  <div class="sec-title" id="singletonsTitle" style="display:none" data-i18n="titleSingletons">Standalone Profiles</div>
  <div id="singletonsContainer"></div>

  <div class="sec-title" id="leaksTitle" data-i18n="titleLeaks">Leak Records</div>
  <div id="leaksContainer"></div>

  <div class="error-msg" id="errorDisplay"></div>
</section>

    optFullScan: 'Full scan (3119 sites, slower)', optNoCache: 'No cache', optSync: 'Sync mode',
    statsSites: 'Sites', statsProfiles: 'Profiles', statsClusters: 'Clusters', statsLeaks: 'Leaks',
    statsSearxng: 'SearXNG', statsTime: 'Elapsed',
    titleHits: 'Site Hits', titleProfiles: 'Profiles', titleMatches: 'Cross-Platform Matches', titleSingletons: 'Standalone Profiles', titleLeaks: 'Leak Records',
    downloadHtml: 'HTML Report', downloadJson: 'JSON Report', downloadPdf: 'PDF Report', downloadMd: 'Markdown Report',
    badgeConfirmed: 'Confirmed', badgeUncertain: 'Uncertain', badgeLow: 'Low',
    wrongPerson: '⚠ Likely wrong person',
    confVeryLikely: 'Very likely same person', confLikely: 'Likely same person', confPossibly: 'Possibly same person', confWeak: 'Weak evidence',
    sigEmail: 'Same email used on both platforms',
    sigPhone: 'Same phone used on both platforms',
    sigAvatar: 'Avatar images appear visually similar',
    sigUsername: 'Usernames are very similar',
    sigJoined: 'Accounts created around the same time',
    sigLocation: 'Same location on both profiles',
    noMatch: 'No evidence linking any two profiles. Each appears to be a different account.',
    standalone: '— No cross-platform match found',
    noExtraEvidence: 'No additional matching signals detected.',
    searchTypeEmail: 'Email leak search (no site probing)',
    searchTypePhone: 'Phone leak search (no site probing)',
    searchTypeUsername: 'Username search (full site probing)',
    optIncremental: 'Incremental (skip cached, probe new only)',
    done: 'Search complete', llmActive: 'LLM verifier active', sources: 'Sources',
    cancelled: 'Cancelled',
    error: 'Error',
    fullProfileData: 'Full profile data',
    phaseSetup: 'Loading...',
    phaseProbe: 'Probing {n} sites...',
    phaseScanning: 'Scanning sites and querying leak databases...',
    phaseExtract: 'Extracting profiles...',
  },
};

let _currentLang = 'zh';

function setLang(lang) {
  _currentLang = lang;
  document.getElementById('langToggleZh').className = lang === 'zh' ? 'active' : '';
  document.getElementById('langToggleEn').className = lang === 'en' ? 'active' : '';
  applyI18n();
}

function L(key) {
  const dict = _STRINGS[_currentLang] || _STRINGS.en;
  return dict[key] || _STRINGS.en[key] || key;
}

function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (el.tagName === 'INPUT') {
      el.placeholder = L(key);
    } else {
      el.textContent = L(key);
    }
  });
}

function catLabel(cat) {
  const en = { social:'Social', devtools:'Dev Tools', forum:'Forum', media:'Media',
    blog:'Blog', gaming:'Gaming', music:'Music', ecommerce:'E-Commerce' };
  const zh = { social:'社交', devtools:'开发工具', forum:'论坛', media:'媒体',
    blog:'博客', gaming:'游戏', music:'音乐', ecommerce:'电商' };
  const map = _currentLang === 'zh' ? zh : en;
  return map[cat] || cat;
}

// ── Search type detection ─────────────────────────────────────
function detectSearchType() {
  const v = document.getElementById('usernameInput').value.trim();
  const badge = document.getElementById('searchTypeBadge');
  if (!v) { badge.style.display = 'none'; return; }
  let label;
  if (v.includes('@')) { label = L('searchTypeEmail'); }
  else if (/^\d{7,15}$/.test(v)) { label = L('searchTypePhone'); }
  else { label = L('searchTypeUsername'); }
  badge.textContent = label; badge.style.display = 'inline-block';
}

// ── Options toggle ────────────────────────────────────────────
function toggleOptions() {
  const p = document.getElementById('paramsPanel');
  p.style.display = p.style.display === 'none' ? 'flex' : 'none';
}

// ── Cancel ────────────────────────────────────────────────────
function cancelSearch() {
  _cancelFlag = true;
  if (evtSource) { evtSource.close(); evtSource = null; }
  document.getElementById('phaseIndicator').textContent = L('cancelled');
  document.getElementById('cancelBtn').style.display = 'none';
  document.getElementById('searchBtn').disabled = false;
  document.getElementById('progressWrap').style.display = 'none';
  document.getElementById('phaseLine').style.display = 'none';
  searchActive = false;
}

// ── Download ──────────────────────────────────────────────────
function downloadReport(fmt) {
  if (!currentTraceId) return;
  const params = new URLSearchParams({format: fmt, username: currentUsername, lang: _currentLang});
  window.location.href = '/api/report/' + encodeURIComponent(currentTraceId) + '?' + params.toString();
}

// ── Main search ────────────────────────────────────────────────
async function doSearch() {
  const input = document.getElementById('usernameInput');
  const username = input.value.trim();
  if (!username) return;
  if (!document.getElementById('ethics').checked) {
    alert('Please acknowledge ethical use first.');
    return;
  }

  _cancelFlag = false;
  currentUsername = username;
  currentTraceId = '';
  searchActive = true;
  _allProfileSites = [];
  _clusterData = [];

  document.getElementById('errorDisplay').style.display = 'none';
  document.getElementById('errorDisplay').textContent = '';
  document.getElementById('hitsContainer').innerHTML = '';
  document.getElementById('profilesContainer').innerHTML = '';
  document.getElementById('clustersContainer').innerHTML = '';
  document.getElementById('leaksContainer').innerHTML = '';
  document.getElementById('singletonsContainer').innerHTML = '';
  document.querySelectorAll('.sec-title').forEach(el => el.style.display = 'none');

  document.getElementById('statsRow').style.display = 'none';
  document.getElementById('downloadRow').style.display = 'none';
  document.getElementById('progressWrap').style.display = 'block';
  document.getElementById('phaseLine').style.display = 'flex';
  document.getElementById('phaseIndicator').textContent = 'Starting...';
  document.getElementById('cancelBtn').style.display = 'inline-block';
  document.getElementById('searchBtn').disabled = true;

  document.getElementById('resultsSection').style.display = 'block';
  document.getElementById('resultDivider').style.display = 'block';
  document.getElementById('scrollHint').style.display = 'block';

  document.getElementById('statHits').textContent = '0';
  document.getElementById('statProfiles').textContent = '0';
  document.getElementById('statClusters').textContent = '0';
  document.getElementById('statLeaks').textContent = '0';
  document.getElementById('statSearxng').textContent = '0';
  document.getElementById('statTime').textContent = '0s';

  setProgress(5);

  if (evtSource) { evtSource.close(); evtSource = null; }

  const migrated = document.getElementById('chkMigrated').checked ? 'true' : 'false';
  const noCache  = document.getElementById('chkNoCache').checked ? 'true' : 'false';
  const sync     = document.getElementById('chkSync').checked ? 'true' : 'false';
  const incremental = document.getElementById('chkIncremental').checked ? 'true' : 'false';

  const qp = new URLSearchParams({
    ethics: 'true', migrated, no_cache: noCache, sync, incremental, lang: _currentLang,
  });
  const url = `/api/search/${encodeURIComponent(username)}?${qp.toString()}`;

  const sse = new EventSource(url);
  evtSource = sse;

  sse.addEventListener('phase', e => {
    if (_cancelFlag) return;
    try {
      const d = JSON.parse(e.data);
      // Use localized phase messages
      const phaseMap = {
        setup: L('phaseSetup'),
        probe: L('phaseProbe').replace('{n}', d.total || ''),
        scanning: L('phaseScanning'),
        extract: L('phaseExtract'),
      };
      document.getElementById('phaseIndicator').textContent = phaseMap[d.phase] || d.message;
      if (d.total) setProgress(20 + Math.min(60, (d.total / 50) * 60));
      else setProgress(30);
    } catch(_) {}
  });

  sse.addEventListener('hit', e => {
    if (_cancelFlag) return;
    try {
      const d = JSON.parse(e.data);
      document.getElementById('hitsTitle').style.display = 'block';
      document.getElementById('statsRow').style.display = 'flex';

      const cat = d.category || 'other';
      const catLabelStr = catLabel(cat);
      let catContainer = document.getElementById('hit-cat-' + cat);
      if (!catContainer) {
        catContainer = document.createElement('div');
        catContainer.id = 'hit-cat-' + cat;
        catContainer.innerHTML = '<div class="cat-header">' + esc(catLabelStr) + '</div>';
        document.getElementById('hitsContainer').appendChild(catContainer);
      }

      let badgeHtml = '', badgeCls = '';
      if (d.confidence !== undefined) {
        if (d.confidence >= 0.75) { badgeHtml = L('badgeConfirmed'); badgeCls = 'tag-ok'; }
        else if (d.confidence >= 0.3) { badgeHtml = L('badgeUncertain'); badgeCls = 'tag-maybe'; }
        else { badgeHtml = L('badgeLow'); badgeCls = 'tag-low'; }
      }
      const badgeSpan = badgeHtml ? '<span class="tag ' + badgeCls + '">' + esc(badgeHtml) + '</span>' : '';
      const wpHtml = d.wrong_person ? '<span class="tag tag-low" style="font-size:10px;margin-left:4px">' + esc(L('wrongPerson')) + '</span>' : '';

      const row = document.createElement('div');
      row.className = 'hit-row';
      row.innerHTML = '<span class="hit-name">' + esc(d.site_name) + '</span>' +
        '<span class="hit-url"><a href="' + escAttr(d.url) + '" target="_blank" rel="noopener">' + esc(d.url) + '</a></span>' +
        badgeSpan + wpHtml;
      catContainer.appendChild(row);

      document.getElementById('statHits').textContent = parseInt(document.getElementById('statHits').textContent) + 1;
    } catch(_) {}
  });

  sse.addEventListener('profile', e => {
    if (_cancelFlag) return;
    try {
      const d = JSON.parse(e.data);
      document.getElementById('profilesTitle').style.display = 'block';
      document.getElementById('statsRow').style.display = 'flex';

      const avatarHtml = d.avatar_url
        ? '<img src="' + escAttr(d.avatar_url) + '" onerror="this.style.display=\'none\'">'
        : '';

      const completenessFields = [d.display_name, d.bio, d.location, d.avatar_url, d.follower_count];
      const filled = completenessFields.filter(f => f !== null && f !== undefined && f !== '').length;
      const pct = Math.round(filled / completenessFields.length * 100);
      const donutHtml = '<div class="comp-ring" style="--pct:' + pct + '" data-pct="' + pct + '%"></div>';

      const metaParts = [];
      if (d.location) metaParts.push(d.location);
      if (d.follower_count !== null && d.follower_count !== undefined) metaParts.push(d.follower_count + ' followers');
      if (d.joined_date) metaParts.push(d.joined_date);

      let extrasHtml = '';
      if (d.extra && typeof d.extra === 'object') {
        const tags = [];
        for (const [k, v] of Object.entries(d.extra)) {
          if (v === null || v === undefined || v === '') continue;
          if (typeof v === 'boolean') { if (v) tags.push('<span class="extra-tag">' + esc(k) + '</span>'); }
          else if (typeof v === 'object') tags.push('<span class="extra-tag">' + esc(k) + ': ' + esc(JSON.stringify(v)) + '</span>');
          else tags.push('<span class="extra-tag">' + esc(k) + ': ' + esc(String(v).slice(0, 50)) + '</span>');
        }
        if (tags.length) extrasHtml = '<div class="card-extras">' + tags.join('') + '</div>';
      }

      const detailFields = [
        ['username', d.username], ['display_name', d.display_name], ['email', d.email],
        ['phone', d.phone], ['location', d.location], ['bio', d.bio],
        ['joined_date', d.joined_date], ['post_count', d.post_count],
        ['follower_count', d.follower_count], ['following_count', d.following_count],
        ['avatar_url', d.avatar_url],
      ];
      const detailRows = detailFields
        .filter(([, v]) => v !== null && v !== undefined && v !== '')
        .map(([k, v]) => '<tr><td>' + esc(k) + '</td><td>' + esc(String(v).slice(0, 300)) + '</td></tr>')
        .join('');
      const detailsHtml = detailRows
        ? '<details class="profile-details"><summary>' + L('fullProfileData') + '</summary><table>' + detailRows + '</table></details>'
        : '';

      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = '<div class="card-hd">' +
        '<div class="card-av">' + avatarHtml + '</div>' +
        '<div style="flex:1"><div class="card-name">' + esc(d.display_name || d.site_id) + '</div>' +
        '<div class="card-site">' + esc(d.site_id) + '</div></div>' +
        donutHtml + '</div>' +
        (d.bio ? '<div class="card-bio">' + esc(d.bio.slice(0, 200)) + '</div>' : '') +
        extrasHtml +
        (metaParts.length ? '<div class="card-meta">' + metaParts.join(' · ') + '</div>' : '') +
        detailsHtml;
      document.getElementById('profilesContainer').appendChild(card);

      _allProfileSites.push(d.site_id);
      document.getElementById('statProfiles').textContent = parseInt(document.getElementById('statProfiles').textContent) + 1;
    } catch(_) {}
  });

  sse.addEventListener('cluster', e => {
    if (_cancelFlag) return;
    try {
      const d = JSON.parse(e.data);
      document.getElementById('clustersTitle').style.display = 'block';
      document.getElementById('statsRow').style.display = 'flex';
      _clusterData.push(d);
      document.getElementById('statClusters').textContent = parseInt(document.getElementById('statClusters').textContent) + 1;
    } catch(_) {}
  });

  sse.addEventListener('leakstatus', e => {
    if (_cancelFlag) return;
    try {
      const d = JSON.parse(e.data);
      document.getElementById('leaksTitle').style.display = 'block';
      document.getElementById('statsRow').style.display = 'flex';

      const container = document.getElementById('leaksContainer');
      container.innerHTML = '';
      const total = d.total || 0;
      const srcList = (d.sources_used || []).join(', ');
      const summary = document.createElement('div');
      summary.style.cssText = 'font-size:13px;color:var(--text-secondary);margin-bottom:8px';
      if (total > 0) {
        const perSrc = Object.entries(d.per_source || {})
          .map(([s, c]) => esc(s) + ': ' + c)
          .join(' · ');
        summary.textContent = total + ' record(s) — ' + perSrc + ' (sources: ' + srcList + ')';
      } else {
        summary.textContent = '0 records (sources: ' + srcList + ')';
      }
      container.appendChild(summary);
    } catch(_) {}
  });

  sse.addEventListener('leak', e => {
    if (_cancelFlag) return;
    try {
      const d = JSON.parse(e.data);
      const src = d.source || 'unknown';
      let srcContainer = document.getElementById('leak-src-' + src.replace(/[^a-zA-Z0-9]/g, '-'));
      if (!srcContainer) {
        srcContainer = document.createElement('div');
        srcContainer.id = 'leak-src-' + src.replace(/[^a-zA-Z0-9]/g, '-');
        srcContainer.innerHTML = '<div class="leak-src-hdr">' + esc(src) + '</div>';
        document.getElementById('leaksContainer').appendChild(srcContainer);
      }
      const row = document.createElement('div');
      row.className = 'leak-row';
      row.innerHTML = '<span class="leak-email">' + (d.email ? esc(redactEmail(d.email)) : '-') + '</span>' +
        '<span class="leak-domain">' + (d.domain ? esc(d.domain) : '') + '</span>' +
        '<span class="leak-date">' + (d.breach_date || '') + '</span>';
      srcContainer.appendChild(row);
      document.getElementById('statLeaks').textContent = parseInt(document.getElementById('statLeaks').textContent) + 1;
    } catch(_) {}
  });

  sse.addEventListener('done', e => {
    if (_cancelFlag) return;
    try {
      const d = JSON.parse(e.data);
      currentTraceId = d.trace_id;
      document.getElementById('statTime').textContent = d.elapsed_s + 's';
      document.getElementById('statSearxng').textContent = d.searxng_hits || 0;
      document.getElementById('phaseIndicator').textContent = L('done') + ' — ' + d.elapsed_s + 's' +
        (d.llm_configured ? ' · ' + L('llmActive') : '') +
        (d.sources_used ? ' · ' + L('sources') + ': ' + d.sources_used.join(', ') : '');
      document.getElementById('progressWrap').style.display = 'none';
      document.getElementById('cancelBtn').style.display = 'none';
      document.getElementById('searchBtn').disabled = false;

      if (d.trace_id && d.hits > 0) {
        document.getElementById('downloadRow').style.display = 'flex';
      }

      renderClustersAndSingletons();
      sse.close(); evtSource = null; searchActive = false;
    } catch(_) {}
  });

  sse.addEventListener('error', e => {
    if (_cancelFlag) return;
    let msg = null;
    if (e.data) { try { msg = JSON.parse(e.data); } catch(_) {} }
    const errText = msg || (sse.readyState === EventSource.CLOSED ? 'Connection lost' : 'Connection error');
    showError(errText);
    if (sse.readyState === EventSource.CLOSED) {
      sse.close(); evtSource = null; searchActive = false;
      document.getElementById('cancelBtn').style.display = 'none';
      document.getElementById('searchBtn').disabled = false;
      document.getElementById('progressWrap').style.display = 'none';
      document.getElementById('phaseLine').style.display = 'none';
    }
  });
}

function setProgress(pct) {
  document.getElementById('progressFill').style.width = Math.min(pct, 95) + '%';
}

function showError(msg) {
  const el = document.getElementById('errorDisplay');
  el.textContent = 'Error: ' + (typeof msg === 'string' ? msg : JSON.stringify(msg));
  el.style.display = 'block';
  document.getElementById('progressWrap').style.display = 'none';
  document.getElementById('phaseLine').style.display = 'none';
  document.getElementById('cancelBtn').style.display = 'none';
  document.getElementById('searchBtn').disabled = false;
}

// ── Helpers ──────────────────────────────────────────────────
function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = String(s); return d.innerHTML; }
function escAttr(s) { if (!s) return ''; return esc(s).replace(/\"/g, '&quot;'); }
function redactEmail(email) {
  const parts = email.split('@');
  if (parts.length !== 2) return email;
  const local = parts[0], domain = parts[1];
  if (local.length <= 2) return local[0] + '***@' + domain;
  return local[0] + '***' + local[local.length - 1] + '@' + domain;
}

function _confLabel(confidence) {
  if (confidence >= 0.9) return { text: L('confVeryLikely'), color: 'var(--green)' };
  if (confidence >= 0.7) return { text: L('confLikely'), color: 'var(--amber)' };
  if (confidence >= 0.5) return { text: L('confPossibly'), color: 'var(--text-tertiary)' };
  return { text: L('confWeak'), color: 'var(--text-tertiary)' };
}

function sigDesc(s) {
  const map = { email:'sigEmail', phone:'sigPhone', avatar_phash:'sigAvatar',
    username:'sigUsername', joined_date:'sigJoined', location:'sigLocation' };
  return L(map[s] || s);
}

function renderClustersAndSingletons() {
  const container = document.getElementById('clustersContainer');
  container.innerHTML = '';

  // Split: single-profile clusters are standalone, not real matches
  const multiClusters = _clusterData.filter(c => (c.profile_count || (c.sites || []).length) > 1);
  const singleClusters = _clusterData.filter(c => (c.profile_count || (c.sites || []).length) <= 1);

  const clusteredSites = new Set();
  multiClusters.forEach(c => { (c.sites || []).forEach(s => clusteredSites.add(s)); });
  // Single-cluster sites are also "clustered" in the data but shouldn't count
  singleClusters.forEach(c => { (c.sites || []).forEach(s => clusteredSites.add(s)); });
  const singletonSites = _allProfileSites.filter(s => !clusteredSites.has(s));
  // Also add single-cluster sites as singletons
  singleClusters.forEach(c => { (c.sites || []).forEach(s => { if (singletonSites.indexOf(s) < 0) singletonSites.push(s); }); });

  if (multiClusters.length === 0 && singletonSites.length > 0) {
    const note = document.createElement('div');
    note.className = 'cluster';
    note.innerHTML = '<div style="font-size:14px;color:var(--text-secondary);padding:4px 0">' + esc(L('noMatch')) + '</div>';
    container.appendChild(note);
  }

  multiClusters.forEach(d => {
    const pct = Math.round(d.confidence * 100);
    const cl = _confLabel(d.confidence);
    const siteCount = (d.sites || []).length;
    const sitesHtml = (d.sites || []).map(s => '<span class="site-pill">' + esc(s) + '</span>').join('');

    const evidenceLines = [];
    if (d.evidence) {
      for (const [sig, details] of Object.entries(d.evidence)) {
        if (!Array.isArray(details) || details.length === 0) continue;
        const sigLabel = sigDesc(sig);
        const parsed = details.map(det => {
          const colon = det.indexOf(': ');
          if (colon > 0 && det.includes('↔')) {
            return { pair: det.substring(0, colon).trim(), value: det.substring(colon + 2).trim() };
          }
          return { pair: '', value: det };
        });

        if (sig === 'username') {
          const seen = new Set();
          const unique = parsed.filter(p => {
            const nm = p.value.match(/(.+?) ↔ (.+?) \(sim=/);
            if (nm) { const k = nm[1].toLowerCase() + '|' + nm[2].toLowerCase(); if (seen.has(k)) return false; seen.add(k); }
            return !seen.has(p.value);
          });
          if (unique.length === 1 && siteCount > 2) {
            const nm = unique[0].value.match(/^(.+?) ↔/);
            evidenceLines.push(sigLabel + ' — All ' + siteCount + ' profiles share the same username "' + esc(nm ? nm[1].trim() : '') + '"');
          } else {
            unique.forEach(p => evidenceLines.push(sigLabel + ' — ' + esc(p.pair ? p.pair + ': ' + p.value : p.value)));
          }
        } else {
          const seenVal = new Set();
          const unique = parsed.filter(p => {
            const n = p.value.replace(/\s+/g, ' ').trim().toLowerCase();
            if (seenVal.has(n)) return false; seenVal.add(n); return true;
          });
          if (unique.length === 1 && siteCount > 2 && (sig === 'email' || sig === 'phone')) {
            evidenceLines.push(sigLabel + ' — Shared across all ' + siteCount + ' profiles');
          } else {
            unique.forEach(p => evidenceLines.push(sigLabel + ' — ' + esc(p.pair ? p.pair + ': ' + p.value : p.value)));
          }
        }
      }
    }
    if (evidenceLines.length === 0 && siteCount > 1) {
      evidenceLines.push('All ' + siteCount + ' profiles found for the same username. ' + L('noExtraEvidence'));
    }

    const evidenceHtml = evidenceLines.map(l => '<div class="cluster-ev">' + l + '</div>').join('');

    const div = document.createElement('div');
    div.className = 'cluster';
    div.innerHTML =
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">' +
      '<span style="font-size:14px;font-weight:600;color:' + cl.color + '">' + esc(cl.text) + '</span>' +
      '<span style="font-size:12px;color:var(--text-tertiary)">(' + pct + '% confidence, ' + siteCount + ' sites)</span></div>' +
      '<div class="cluster-bar"><div class="cluster-bar-fill" style="width:' + pct + '%;background:' + cl.color + '"></div></div>' +
      '<div class="cluster-sites">' + sitesHtml + '</div>' +
      evidenceHtml;
    container.appendChild(div);
  });

  if (singletonSites.length > 0) {
    document.getElementById('singletonsTitle').style.display = 'block';
    const sc = document.getElementById('singletonsContainer');
    sc.innerHTML = '';
    singletonSites.forEach(s => {
      const div = document.createElement('div');
      div.className = 'singleton-row';
      div.innerHTML = '<span style="font-weight:500">' + esc(s) + '</span>' +
        '<span style="font-size:13px;color:var(--text-tertiary)">' + esc(L('standalone')) + '</span>';
      sc.appendChild(div);
    });
  }

  if (multiClusters.length > 0 || singletonSites.length > 0) {
    document.getElementById('clustersTitle').style.display = 'block';
  }
  // Update cluster stat to show only real cross-platform matches
  document.getElementById('statClusters').textContent = multiClusters.length;
}

// ── Init ──────────────────────────────────────────────────────
applyI18n();
// ── IME-aware Enter: don't search when Enter confirms IME input ──
document.getElementById('usernameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.isComposing) doSearch();
});
