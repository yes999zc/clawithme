[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "clawithme"
version = "0.1.0"
description = "Open-source OSINT tool — username to identity panorama"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [
    {name = "9哥"}
]
keywords = ["osint", "username", "investigation", "privacy"]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Information Technology",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Topic :: Security",
]

dependencies = [
    "pydantic>=2.0",
    "structlog>=24.0",
    "httpx>=0.27",
    "scrapling>=0.4",
    "aiohttp>=3.9",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=4.0",
]

[project.scripts]
clawithme = "clawithme.cli:main"

[tool.setuptools.packages.find]
include = ["clawithme*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
