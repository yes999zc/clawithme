# clawithme configuration example
# Copy to config.toml and fill in your values

[proxy]
# ── Deprecated (kept for backward compatibility) ──
# Single proxy for all sites. Use [proxy.tiers] instead.
http = ""
https = ""

# ── Tiered proxy (recommended) ──
# Each tier maps to a proxy URL. Sites declare their tier via "proxy_tier" field.
# Empty string = direct connection (no proxy).
# Format: http://user:pass@host:port  or  socks5://host:port
[proxy.tiers]
direct = ""                                      # no proxy (default for most sites)
datacenter = ""                                  # e.g. "http://127.0.0.1:7890" (Clash)
residential = ""                                 # e.g. "http://user:pass@provider.com:8080"

[apis]
# Hudson Rock Cavalier — free, no key required
# cavalier_base_url = "https://cavalier.hudsonrock.com/api/json/v2"

# HaveIBeenPwned (Phase 4)
hibp_api_key = ""

# Dehashed (Phase 4, paid)
dehashed_api_key = ""
dehashed_email = ""

# Discord Bot API (for Discord profile extraction)
discord_bot_token = ""

[cookies]
# LinkedIn cookie file (JSON format, exported from browser DevTools).
# Go to linkedin.com → F12 → Application → Cookies → select all → Copy as JSON.
# Save to a file and set the path here.
linkedin_file = ""

[scanning]
# Default timeout per site probe (ms)
default_timeout_ms = 5000

# Max concurrent probes
max_concurrency = 10

# Minimum interval between requests to same site (ms)
min_interval_ms = 500

# SearXNG fallback search URL (Docker: http://searxng:8080/search)
searxng_url = "http://localhost:8888/search"

[logging]
level = "INFO"
# Set to DEBUG for trace-level output
# level = "DEBUG"
